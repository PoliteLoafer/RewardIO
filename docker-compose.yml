services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rewardio
      POSTGRES_USER: rewardio
      POSTGRES_PASSWORD: rewardio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REWARDIO__POSTGRES_URL=postgres://rewardio:rewardio@postgres:5432/rewardio
    volumes:
      - ./logs:/app/logs
      - ./users.json:/app/users.json
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data:
